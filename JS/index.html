<!DOCTYPE html>
<html lang="pt-br">

<head>
	<meta charset="UTF-8">
	<title>Aparecida Nutrição</title>
	<link rel="icon" href="favicon.ico" type="image/x-icon">
	<link rel="stylesheet" type="text/css" href="css/reset.css">
	<link rel="stylesheet" type="text/css" href="css/index.css">

	<!-- <script>
			alert('Bahhhh');
			console.log('É os guri');
		</script> -->

</head>

<body>

	<a href="../index.html">VOLTAR</a>

	<header>
		<div class="container">
			<h1>Aparecida Nutrição</h1>
		</div>
	</header>
	<main>
		<section class="container">
			<h2>Meus pacientes</h2>
			<table>
				<thead>
					<tr>
						<th>Nome</th>
						<th>Peso(kg)</th>
						<th>Altura(m)</th>
						<th>Gordura Corporal(%)</th>
						<th>IMC</th>
					</tr>
				</thead>
				<tbody id="tabela-pacientes">
					<tr class="paciente" id="primeiro-paciente">
						<td class="info-nome">Paulo</td>
						<td class="info-peso">1000</td>
						<td class="info-altura">2.00</td>
						<td class="info-gordura">10</td>
						<td class="info-imc">0</td>
					</tr>

					<tr class="paciente">
						<td class="info-nome">João</td>
						<td class="info-peso">80</td>
						<td class="info-altura">1.72</td>
						<td class="info-gordura">40</td>
						<td class="info-imc">0</td>
					</tr>

					<tr class="paciente">
						<td class="info-nome">Erica</td>
						<td class="info-peso">54</td>
						<td class="info-altura">1.64</td>
						<td class="info-gordura">14</td>
						<td class="info-imc">0</td>
					</tr>

					<tr class="paciente">
						<td class="info-nome">Douglas</td>
						<td class="info-peso">85</td>
						<td class="info-altura">1.73</td>
						<td class="info-gordura">24</td>
						<td class="info-imc">0</td>
					</tr>
					<tr class="paciente" id="tatiana">
						<td class="info-nome">Tatiana</td>
						<td class="info-peso">46</td>
						<td class="info-altura">1.55</td>
						<td class="info-gordura">19</td>
						<td class="info-imc">0</td>
					</tr>
				</tbody>
			</table>

		</section>
	</main>
	<br>
	<section class="container">
		<h2 id="titulo-form">Adicionar novo Paciente</h2>
		<form id="form-adiciona">
			<div class="grupo">
				<label for=""></label>
				<input type="text" id="nome" name="nome" placeholder="Digite o nome do paciente" class="campo">
			</div>
			<div class="grupo">
				<label for=""></label>
				<input type="text" id="peso" name="peso" placeholder="Digite o peso do paciente"
					class="campo campo-medio">
			</div>
			<div class="grupo">
				<label for=""></label>
				<input type="text" id="altura" name="altura" placeholder="Digite a altura do paciente"
					class="campo campo-medio">
			</div>
			<div class="grupo">
				<label for=""></label>
				<input type="text" id="gordura" name="gordura" placeholder="Digite a gordura do paciente"
					class="campo campo-medio">
			</div>
			<button id="adicionar-paciente" class="botao bto-principal" onclick="tocarSom()">Adicionar</button>
		</form>
	</section>

	<audio id="somDoClique" src="ai-meu-c.mp3"></audio>

	<script src="js/principal.js"></script>
	<script src="js/form-adiciona.js"></script>

	<script>
		function tocarSom() {
			const audio = document.getElementById("somDoClique");
			audio.currentTime = 0; // Reinicia o som caso o botão seja clicado várias vezes seguidas
			audio.play();
		}
	</script>

</body>

</html>
